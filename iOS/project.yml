name: Succulog
options:
  bundleIdPrefix: com.shimondeitel.succulog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Succulog:
    type: application
    platform: iOS
    sources:
      - path: Succulog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.succulog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Succulog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SucculogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SucculogTests
      - path: Succulog.storekit
    dependencies:
      - target: Succulog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.succulog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SucculogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SucculogUITests
    dependencies:
      - target: Succulog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.succulog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Succulog:
    build:
      targets:
        Succulog: all
        SucculogTests: [test]
        SucculogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Succulog.storekit
    test:
      config: Debug
      storeKitConfiguration: Succulog.storekit
      targets:
        - SucculogTests
        - SucculogUITests
    archive:
      config: Release
